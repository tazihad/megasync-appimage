name: Release

on:
  push:
    tags:
    - 'v[0-9].*'
  workflow_dispatch:

jobs:
  release:
    name: Test
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Get latest MEGAsync release tag
        id: get-latest-tag
        run: |
          latest_tag=$(curl -s https://api.github.com/repos/meganz/MEGAsync/releases/latest | jq -r .tag_name)
          echo "latest_tag=$latest_tag" >> $GITHUB_ENV

      - name: Install dependencies
        run: ./utils/dependencies.sh

      - name: Build MEGAsync
        run: ./utils/build.sh

      - name: Create AppImage
        run: ./utils/package.sh

      - name: Create GitHub release
        id: create-release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: ${{ env.latest_tag }}
          release_name: ${{ env.latest_tag }}
          draft: false
          prerelease: false

      - name: Upload AppImage
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: ./MEGAsync-x86_64.AppImage
          asset_name: MEGAsync-x86_64-${{ env.latest_tag }}.AppImage
          asset_content_type: application/octet-stream

      - name: Print URL
        run: |
          echo "Release: ${{ steps.create-release.outputs.html_url }}"
          echo "AppImage: ${{ steps.upload-release-asset.outputs.browser_download_url }}"
